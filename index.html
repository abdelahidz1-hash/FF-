<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر التطبيقات</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #0b0b0b;
            --text-color: #ffffff;
            --accent-color: linear-gradient(45deg, #ffd700, #ffffff, #b8860b); 
            --accent-hover: linear-gradient(45deg, #ffffff, #ffea00, #ffffff);
            --muted-text: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; font-weight: 300; }
        body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; padding-bottom: 60px; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; background-color: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); z-index: 100; }
        .header-title-container { display: flex; align-items: center; gap: 10px; }
        header h1 { font-size: 1.25rem; letter-spacing: 1px; background: linear-gradient(45deg, #ffd700, #ffea00, #dcdcdc, #b8860b, #ffffff); background-size: 400% 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradientMove 6s ease infinite; font-weight: bold; }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .app-card { background-color: rgba(11, 11, 11, 0.85); border: 1px solid #151515; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; transition: transform 0.2s; }
        .app-card:hover { transform: translateY(-5px); border-color: #333; }
        .app-info { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .app-icon { width: 60px; height: 60px; background: #1a1a1a; border-radius: 14px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .app-icon img { width: 100%; height: 100%; object-fit: cover; }
        .app-details h3 { font-size: 1.1rem; margin-bottom: 4px; }
        .app-desc { font-size: 0.9rem; color: #b3b3b3; margin-bottom: 20px; height: 45px; overflow: hidden; }
        
        .btn-download { background: var(--accent-color); color: var(--text-color); text-align: center; padding: 10px; border-radius: 8px; text-decoration: none; font-size: 0.95rem; display: flex; align-items: center; justify-content: center; border: none; }
        .update-notice { text-align: center; font-size: 1.1rem; margin-top: 30px; background: linear-gradient(45deg, #ffffff, #ffd700, #ff0000, #ffff00, #00ff00, #0000ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradientMove 8s ease infinite; }
        
        .video-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #000000; z-index: 200; display: none; justify-content: center; align-items: center; flex-direction: column; }
        .close-video-btn { position: absolute; top: 20px; left: 20px; background: #111; padding: 8px; border-radius: 50%; cursor: pointer; border: 1px solid #333; }
        .video-player-container { width: 100%; max-width: 360px; aspect-ratio: 9/16; background: #050505; border-radius: 12px; overflow: hidden; }
        .video-player-container video { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <header>
        <div class="header-title-container">
            <h1>GLITCH FREE FIRE</h1>
        </div>
    </header>

    <div class="container">
        <div class="apps-grid" id="apps-container">
            </div>
        <p class="update-notice">سوف يتم تحديث قلتشات تلقائيا</p>
    </div>

    <script>
        fetch('items.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('apps-container');
                data.forEach(app => {
                    container.innerHTML += `
                    <div class="app-card">
                        <div class="app-info">
                            <div class="app-icon"><img src="${app.icon}" alt=""></div>
                            <div class="app-details">
                                <h3 style="color: #00ff00;">${app.name}</h3>
                                <span>تحديث جديد</span>
                            </div>
                        </div>
                        <p class="app-desc">${app.desc}</p>
                        <a href="${app.link}" target="_blank" class="btn-download">
                            <img src="https://images.icon-icons.com/1875/PNG/96/download_120262.png" alt="تحميل" style="width: 30px; height: 30px;">
                        </a>
                    </div>`;
                });
            });
    </script>
</body>
</html>
