<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLITCH FREE FIRE SK</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #0b0b0b;
            --text-color: #ffffff;
            --accent-color: linear-gradient(45deg, #ffd700, #ffffff, #b8860b); 
            --border-glow: linear-gradient(45deg, #ffd700, #c0c0c0, #ffffff);
            --muted-text: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; font-weight: 300; }
        body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; padding-bottom: 60px; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; background-color: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); z-index: 100; }
        .header-title-container { flex-grow: 1; text-align: center; }
        header h1 { font-size: 1rem; letter-spacing: 1px; background: linear-gradient(45deg, #ffd700, #ffea00, #dcdcdc, #b8860b, #ffffff); background-size: 400% 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradientMove 6s ease infinite; font-weight: bold; }
        
        .header-actions { display: flex; gap: 15px; align-items: center; }
        .action-btn { cursor: pointer; width: 36px; height: 36px; }

        /* Modal Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 40px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; border: 1px solid #333; width: 320px; }
        .modal-content input { background: #000; border: 1px solid #555; color: #fff; padding: 12px; border-radius: 8px; outline: none; width: 100%; font-size: 1rem; }
        
        #searchStatus { font-size: 0.9rem; margin-top: 10px; font-weight: bold; }
        .success { color: #00ff00; }
        .error { color: #ff0000; }

        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .app-card { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; padding: 20px; }
        .app-info { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .app-icon { width: 60px; height: 60px; background: rgba(255, 255, 255, 0.1); border-radius: 14px; overflow: hidden; }
        .app-icon img { width: 100%; height: 100%; object-fit: cover; }
        
        .app-details h3 { font-size: 1.1rem; color: #00ff00; text-shadow: 0 0 8px #00ff00; }
        .app-desc { font-size: 0.9rem; color: #ffffff; margin-bottom: 20px; height: 45px; overflow: hidden; }
        
        .btn-download { background: var(--accent-color); color: #000; text-align: center; padding: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; display: block; }
        .update-notice { text-align: center; font-size: 1.1rem; margin-top: 30px; background: linear-gradient(45deg, #ffffff, #ffd700, #ff0000, #ffff00, #00ff00, #0000ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradientMove 8s ease infinite; }
    </style>
</head>
<body>

    <header>
        <div style="width: 80px;"></div> 
        <div class="header-title-container"><h1>GLITCH FREE FIRE</h1></div>
        <div class="header-actions">
            <img src="https://images.icon-icons.com/561/PNG/96/search-circular-symbol_icon-icons.com_53800.png" class="action-btn" onclick="document.getElementById('searchModal').style.display='flex'">
        </div>
    </header>

    <div id="searchModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <input type="text" id="searchField" placeholder="ابحث عن قلتش..." oninput="performSearch()">
            <div id="searchStatus"></div>
        </div>
    </div>

    <div class="container">
        <div class="apps-grid" id="apps-container"></div>
        <p class="update-notice">سوف يتم تحديث قلتشات تلقائيا</p>
    </div>

    <script>
        let allApps = [];

        fetch('items.json')
            .then(response => response.json())
            .then(data => { allApps = data; renderApps(allApps); });

        function renderApps(apps) {
            const container = document.getElementById('apps-container');
            container.innerHTML = '';
            apps.forEach(app => {
                container.innerHTML += `
                <div class="app-card">
                    <div class="app-info">
                        <div class="app-icon"><img src="${app.icon}" alt=""></div>
                        <div class="app-details"><h3>${app.name}</h3></div>
                    </div>
                    <div class="app-desc">${app.desc}</div>
                    <a href="${app.link}" class="btn-download">تحميل</a>
                </div>`;
            });
        }

        function performSearch() {
            const term = document.getElementById('searchField').value.toLowerCase();
            const status = document.getElementById('searchStatus');
            const filtered = allApps.filter(app => app.name.toLowerCase().includes(term) || app.desc.toLowerCase().includes(term));
            
            renderApps(filtered);
            
            if (term === "") {
                status.innerText = "";
            } else if (filtered.length > 0) {
                status.innerText = "تم العثور على هذا قلتش";
                status.className = "success";
            } else {
                status.innerText = "لم يتم العثور على قلتش";
                status.className = "error";
            }
        }
    </script>
</body>
</html>
