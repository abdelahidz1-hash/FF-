<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREE FIRE ELEMENTS</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* تصميم الخلفية والصفحة بالكامل بلون أسود خالص Deep Dark */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-weight: 900; /* الوزن الأعرض للعنوان الرئيسي */
            color: #ff3e3e; /* لافت بلون نيون أحمر */
            text-shadow: 0 0 10px rgba(255, 62, 62, 0.5);
            margin-bottom: 30px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .controls input, .controls select {
            background: #111111;
            border: 1px solid #333333;
            color: #ffffff;
            padding: 12px 20px;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            outline: none;
            width: 100%;
            transition: all 0.3s ease;
        }

        .controls input:focus, .controls select:focus {
            border-color: #ff3e3e;
            box-shadow: 0 0 10px rgba(255, 62, 62, 0.3);
        }

        /* شبكة عرض كروت العناصر */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* تصميم الكارت بشكل الزجاج المظلم Glassmorphism */
        .item-card {
            background: rgba(15, 15, 15, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .item-card:hover {
            transform: translateY(-5px);
            border-color: #ff3e3e;
            box-shadow: 0 5px 20px rgba(255, 62, 62, 0.2);
        }

        .item-card img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
            background: #1a1a1a;
        }

        /* تعديل وزن الاسم ليكون عريضاً جداً ومميزاً */
        .item-name {
            font-weight: 900; /* Cairo Black 900 */
            font-size: 18px;
            margin: 10px 0 5px 0;
            color: #ffffff;
        }

        .item-id {
            font-size: 13px;
            color: #888888;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <h1>FREE FIRE ELEMENTS</h1>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="ابحث عن عنصر بالاسم أو الـ ID...">
        <select id="categoryFilter">
            <option value="all">كل التصنيفات</option>
            <option value="characters">الشخصيات</option>
            <option value="weapons">الأسلحة</option>
            <option value="bundles">الحزم</option>
        </select>
    </div>

    <div class="items-grid" id="itemsContainer"></div>

    <script src="app.js"></script>
</body>
</html>
