<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة عناصر فري فاير</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* ==========================================================================
           1. تنسيقات التصميم والمظهر (CSS)
           ========================================================================== */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Cairo', sans-serif;
            font-weight: 300;
            box-sizing: border-box;
        }

        .wrapper {
            max-width: 600px;
            margin: 0 auto;
            padding: 15px;
        }

        header h1 {
            text-align: center;
            font-size: 22px;
            margin-top: 10px;
            margin-bottom: 20px;
            font-weight: 300;
        }

        .search-box {
            position: relative;
            margin-bottom: 15px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            background-color: #111111;
            border: 1px solid #252525;
            border-radius: 25px;
            color: #fff;
            font-size: 14px;
            outline: none;
            text-align: right;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            font-weight: 300;
        }

        .search-box input::placeholder {
            color: #666;
        }

        .search-icon {
            position: absolute;
            top: 50%;
            right: 15px;
            transform: translateY(-50%);
            color: #666;
            font-size: 15px;
        }

        .filters-container {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .filters-container select {
            flex: 1;
            background-color: #111111;
            color: #aaaaaa;
            border: 1px solid #252525;
            padding: 10px 5px;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            cursor: pointer;
            text-align: center;
            font-family: 'Cairo', sans-serif;
            font-weight: 300;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 6px;
        }

        .item-card {
            background-color: #050505;
            border-radius: 6px;
            overflow: hidden;
            aspect-ratio: 1 / 1;
            border: 1px solid #d4af37;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            box-shadow: inset 0 0 10px rgba(255, 215, 0, 0.2), 0 0 5px rgba(255, 255, 255, 0.1);
        }

        .item-card:hover {
            transform: scale(1.04);
            border-color: #ffffff;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.6), inset 0 0 8px rgba(212, 175, 55, 0.5);
        }

        .img-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #d4af37 0%, #e5e4e2 50%, #ffffff 100%);
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1>مكتبة عناصر فري فاير</h1>
        </header>

        <section class="search-filter-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="ابحث باستخدام اسم العنصر، أو رمزه، أو معرفه...">
                <i class="fas fa-search search-icon"></i>
            </div>

            <div class="filters-container">
                <select id="rarityFilter">
                    <option value="all">جميعها نادرة</option>
                    <option value="legendary">أسطوري</option>
                    <option value="rare">نادر</option>
                </select>

                <select id="typeFilter">
                    <option value="all">جميع الأنواع</option>
                    <option value="characters">شخصيات</option>
                    <option value="skins">سكنات</option>
                </select>

                <select id="tagFilter">
                    <option value="all">جميع الوسوم</option>
                    <option value="new">جديد</option>
                </select>
            </div>
        </section>

        <main class="items-grid" id="itemsGrid"></main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('searchInput');
            const rarityFilter = document.getElementById('rarityFilter');
            const typeFilter = document.getElementById('typeFilter');
            const tagFilter = document.getElementById('tagFilter');
            const itemsGrid = document.getElementById('itemsGrid');

            fetch('items.json')
                .then(response => response.json())
                .then(data => {
                    buildGrid(data);
                    searchInput.addEventListener('input', filterItems);
                    rarityFilter.addEventListener('change', filterItems);
                    typeFilter.addEventListener('change', filterItems);
                    tagFilter.addEventListener('change', filterItems);
                })
                .catch(error => console.error('خطأ:', error));

            function buildGrid(items) {
                itemsGrid.innerHTML = '';
                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.setAttribute('data-name', item.name || '');
                    card.setAttribute('data-id', item.id || '');
                    card.setAttribute('data-type', item.type || '');
                    card.setAttribute('data-rarity', item.rarity || '');
                    card.setAttribute('data-tag', item.tag || '');

                    const imgContainer = document.createElement('div');
                    imgContainer.className = 'img-container';
                    const img = document.createElement('img');
                    img.src = item.image || ''; 
                    img.alt = item.name || 'item';

                    imgContainer.appendChild(img);
                    card.appendChild(imgContainer);
                    itemsGrid.appendChild(card);
                });
            }

            function filterItems() {
                const searchText = searchInput.value.toLowerCase().trim();
                const selectedRarity = rarityFilter.value;
                const selectedType = typeFilter.value;
                const selectedTag = tagFilter.value;
                const itemCards = document.querySelectorAll('.item-card');

                itemCards.forEach(card => {
                    const itemName = card.getAttribute('data-name').toLowerCase();
                    const itemId = card.getAttribute('data-id').toLowerCase();
                    const itemRarity = card.getAttribute('data-rarity');
                    const itemType = card.getAttribute('data-type');
                    const itemTag = card.getAttribute('data-tag');

                    const matchesSearch = itemName.includes(searchText) || itemId.includes(searchText);
                    const matchesRarity = (selectedRarity === 'all' || itemRarity === selectedRarity);
                    const matchesType = (selectedType === 'all' || itemType === selectedType);
                    const matchesTag = (selectedTag === 'all' || itemTag === selectedTag);

                    if (matchesSearch && matchesRarity && matchesType && matchesTag) {
                        card.style.display = 'block';
                    } else {
                        card.style.display = 'none';
                    }
                });
            }
        });
    </script>
</body>
</html>
