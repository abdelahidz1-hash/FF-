<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة عناصر فري فاير</title>
    <!-- استدعاء خط Cairo و Cairo Black -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* تصميم عصري باللون الأسود الكامل */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-family: 'Cairo', sans-serif;
            font-weight: 900; /* وزن عريض جداً لقوة التصميم */
            text-align: center;
            color: #ff3e3e; /* لمسة نيون حمراء */
            text-shadow: 0 0 10px rgba(255, 62, 62, 0.5);
        }

        /* شريط البحث والفلترة */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        input, select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 15px;
            border-radius: 8px;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #ff3e3e;
            box-shadow: 0 0 8px rgba(255, 62, 62, 0.3);
        }

        /* شبكة العناصر (Grid) */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* تأثير الزجاج (Glassmorphism) للبطاقات */
        .item-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            backdrop-filter: blur(5px);
            transition: transform 0.3s, border-color 0.3s;
        }

        .item-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 62, 62, 0.4);
            box-shadow: 0 5px 15px rgba(255, 62, 62, 0.1);
        }

        .item-card img {
            width: 100%;
            max-width: 1200px;
            height: auto;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .item-name {
            font-weight: 700;
            font-size: 14px;
            margin: 8px 0;
        }

        .item-id {
            font-size: 11px;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>مكتبة العناصر الذكية</h1>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="ابحث عن عنصر...">
        <select id="categoryFilter">
            <option value="all">كل التصنيفات</option>
            <option value="characters">الشخصيات</option>
            <option value="weapons">الأسلحة</option>
            <option value="bundles">الحزم</option>
        </select>
    </div>

    <div class="items-grid" id="itemsContainer">
        <!-- سيتم توليد العناصر هنا بواسطة الجافاسكريبت -->
    </div>

    <script src="app.js"></script>
</body>
</html>
