<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLITCH FREE FIRE SK</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;700&display=swap" rel="stylesheet">

    <style>
        /* ستايل الشاشة الترحيبية */
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px; text-align: center; cursor: pointer; }
        
        .welcome-banner { 
            background: linear-gradient(135deg, #1a1a1a, #000); 
            border: 2px solid #ffd700; 
            border-radius: 20px; 
            padding: 20px; 
            max-width: 400px; 
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); 
        }
        .welcome-text { color: #fff; font-size: 0.9rem; line-height: 1.5; text-align: justify; font-weight: bold; }
        .welcome-text b { color: #00ff00; } 
        
        .welcome-title {
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 1.6rem;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #ffd700, #c0c0c0, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .start-btn { margin-top: 20px; padding: 8px 25px; background: linear-gradient(45deg, #ffd700, #c0c0c0); color: #000; border-radius: 25px; font-weight: bold; display: inline-block; font-size: 0.9rem; }
        
        .check-icon { width: 14px; height: 14px; vertical-align: middle; margin-left: 5px; filter: brightness(0) invert(1); }
        .danger-icon { width: 14px; height: 14px; vertical-align: middle; margin-left: 5px; filter: invert(36%) sepia(90%) saturate(2256%) hue-rotate(345deg) brightness(95%) contrast(90%); }
        .rocket-icon { width: 14px; height: 14px; vertical-align: middle; margin-left: 5px; filter: brightness(0) invert(1); }

        :root { --card-bg: #0a0a0a; --text-color: #ffffff; --accent-color: linear-gradient(45deg, #ffd700, #c0c0c0, #ffffff); }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; font-weight: 300; }
        
        body { 
            background-color: #000000; /* خلفية سوداء داكنة */
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000 100%);
            background-attachment: fixed;
            color: var(--text-color); 
            line-height: 1.6; 
            padding-bottom: 60px; 
        }

        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #333; position: sticky; top: 0; background-color: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); z-index: 100; }
        .header-title-container { flex-grow: 1; text-align: center; }
        header h1 { font-size: 1rem; letter-spacing: 1px; color: #fff; font-weight: bold; background: linear-gradient(to right, #ffd700, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .icon-container { position: relative; display: flex; align-items: center; justify-content: center; }
        .action-btn { cursor: pointer; width: 36px; height: 36px; filter: invert(1); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 40px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; border: 1px solid #333; width: 300px; }
        .modal-content input { background: #000; border: 1px solid #444; color: #fff; padding: 10px 20px; border-radius: 8px; width: 100%; }
        .send-btn { width: 50px; height: 50px; cursor: pointer; filter: invert(1); }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .app-card { 
            background: var(--card-bg); 
            border: 1px solid #333; 
            border-radius: 12px; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            transition: all 0.3s;
            position: relative;
        }
        .app-card:hover { border-color: #ffd700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.1); }
        
        .app-icon { width: 105px; height: 105px; background: #111; border-radius: 14px; margin-bottom: 15px; border: 1px solid #222; }
        .app-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 14px; }
        
        .app-details h3 { font-size: 1.1rem; margin-bottom: 10px; color: #ffffff; }
        
        .cod-container { 
            display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 5px 0 15px 0; color: #ffd700; font-weight: bold; background: #000; padding: 10px; border-radius: 8px; border: 1px solid #222;
        }
        
        .copy-btn { width: 24px; height: 24px; cursor: pointer; filter: invert(80%) sepia(50%) saturate(1500%) hue-rotate(10deg); }
        
        .app-desc { font-size: 0.9rem; color: #888; margin-bottom: 20px; height: 45px; overflow: hidden; }
        
        .btn-download { background: #fff; color: #000; width: 100%; padding: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        
        .update-notice { text-align: center; font-size: 1.1rem; margin-top: 30px; color: #555; }
    </style>
</head>
<body>

    <div id="welcome-screen" onclick="this.style.display='none'">
        <div class="welcome-banner">
            <div class="welcome-title">GLITCH SKIN FF</div>
            <div class="welcome-text">
                <center style="display: flex; justify-content: center; gap: 5px; margin-bottom: 10px;">
                    <img src="https://i.ibb.co/MDrvqgCc/Picsart-26-05-28-22-03-09-928.png" style="width: 50px;">
                    <img src="https://i.ibb.co/RTTzmNJc/Picsart-26-05-28-22-18-02-445.png" style="width: 50px;">
                    <img src="https://i.ibb.co/WWTn1304/Picsart-26-05-28-22-27-13-388.png" style="width: 50px;">
                </center>
                نقدم لك منصة احترافية لقلتشات Free Fire بتصميم داكن وأنيق.<br><br>
                <img src="https://images.icon-icons.com/1206/PNG/96/1491254409-truecheckacceptapprove_82933.png" class="check-icon"> <b>أمان عالٍ</b><br>
                <img src="https://images.icon-icons.com/4089/PNG/96/money_education_laboratory_planet_finance_launch_missile_startup_spaceship_business_science_astronomy_spacecraft_space_rocket_icon_259588.png" class="rocket-icon"> <b>تجربة سريعة</b><br>
                <img src="https://images.icon-icons.com/2941/PNG/96/danger_triangle_icon_183758.png" class="danger-icon"> <b>استخدم حساب احتياطي</b>
            </div>
            <div class="start-btn">ابدأ التجربة</div>
        </div>
    </div>

    <header>
        <div style="width: 80px;"></div> 
        <div class="header-title-container"><h1>GLITCH FREE FIRE</h1></div>
        <div class="header-actions">
            <div class="icon-container" onclick="document.getElementById('searchModal').style.display='flex'">
                <img src="https://images.icon-icons.com/561/PNG/96/search-circular-symbol_icon-icons.com_53800.png" class="action-btn" alt="بحث">
            </div>
        </div>
    </header>

    <div id="searchModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <input type="text" id="searchField" placeholder="ابحث عن قلتش...">
            <img src="https://images.icon-icons.com/2838/PNG/96/mail_send_icon_180871.png" class="send-btn" onclick="performSearch()">
        </div>
    </div>

    <div class="container">
        <div class="apps-grid" id="apps-container"></div>
        <p class="update-notice">يتم التحديث تلقائياً...</p>
    </div>

    <script>
        let allApps = [];
        fetch('items.json').then(r => r.json()).then(data => { allApps = data; renderApps(allApps); });
        function copyToClipboard(t) { navigator.clipboard.writeText(t).then(() => alert("تم النسخ: " + t)); }
        function renderApps(apps) {
            const container = document.getElementById('apps-container');
            container.innerHTML = '';
            apps.forEach(app => {
                container.innerHTML += `
                <div class="app-card">
                    <div class="app-icon"><img src="${app.icon}"></div>
                    <div class="app-details"><h3>${app.name}</h3></div>
                    ${app.code ? `<div class="cod-container"><span>COD : ${app.code}</span><img src="https://images.icon-icons.com/935/PNG/96/copy-two-paper-sheets-interface-symbol_icon-icons.com_73283.png" class="copy-btn" onclick="copyToClipboard('${app.code}')"></div>` : ''}
                    <div class="app-desc">${app.desc}</div>
                    <a href="${app.link}" class="btn-download">تحميل</a>
                </div>`;
            });
        }
        function performSearch() {
            const term = document.getElementById('searchField').value.toLowerCase();
            renderApps(allApps.filter(a => a.name.toLowerCase().includes(term) || a.desc.toLowerCase().includes(term)));
            document.getElementById('searchModal').style.display = 'none';
        }
    </script>
</body>
</html>
