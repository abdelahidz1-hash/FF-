<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLITCH FREE FIRE SK</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300&display=swap" rel="stylesheet">

    <style>
        /* ستايل الشاشة الترحيبية */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        #splash-screen img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* شريط التحميل الاحترافي */
        .loader-container {
            position: absolute;
            bottom: 50px;
            width: 80%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        .loader-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ffd700, #ffffff);
            animation: progress 5s linear forwards;
        }
        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        :root {
            --bg-color: #000000;
            --card-bg: #0b0b0b;
            --text-color: #ffffff;
            --accent-color: linear-gradient(45deg, #ffd700, #ffffff, #b8860b); 
            --border-glow: linear-gradient(45deg, #ffd700, #c0c0c0, #ffffff);
            --muted-text: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; font-weight: 300; }
        body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; padding-bottom: 60px; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; background-color: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); z-index: 100; }
        .header-title-container { flex-grow: 1; text-align: center; }
        header h1 { font-size: 1rem; letter-spacing: 1px; background: linear-gradient(45deg, #ffd700, #ffea00, #dcdcdc, #b8860b, #ffffff); background-size: 400% 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradientMove 6s ease infinite; font-weight: bold; }
        
        .header-actions { display: flex; gap: 15px; align-items: center; }
        .icon-container { position: relative; display: flex; align-items: center; justify-content: center; }
        .action-btn { cursor: pointer; width: 36px; height: 36px; position: relative; z-index: 2; }
        .icon-glow { position: absolute; width: 45px; height: 45px; background: radial-gradient(circle, rgba(255,215,0,0.4) 0%, rgba(0,0,0,0) 70%); z-index: 1; }

        /* Modal Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 40px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; border: 1px solid #333; box-shadow: 0 0 20px rgba(255,255,255,0.1); width: 300px; height: 300px; }
        .modal-content input { background: #000; border: 1px solid #555; color: #fff; padding: 10px 20px; border-radius: 8px; outline: none; width: 100%; font-size: 1rem; }
        .send-btn { width: 50px; height: 50px; cursor: pointer; margin-top: 15px; }

        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .app-card { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; transition: transform 0.2s; }
        .app-card:hover { transform: translateY(-5px); border-color: rgba(255, 255, 255, 0.4); }
        .app-info { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .app-icon { width: 60px; height: 60px; background: rgba(255, 255, 255, 0.1); border-radius: 14px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .app-icon img { width: 100%; height: 100%; object-fit: cover; }
        
        .app-details h3 { font-size: 1.1rem; margin-bottom: 4px; color: #00ff00; text-shadow: 0 0 8px #00ff00; }
        /* التعديل هنا: تنسيق الكود وزر النسخ */
        .cod-container { display: flex; align-items: center; gap: 10px; margin: 5px 0 15px 0; color: #ffd700; font-weight: bold; font-size: 0.9rem; }
        .copy-btn { width: 20px; height: 20px; cursor: pointer; }
        
        .app-desc { font-size: 0.9rem; color: #ffffff; text-shadow: 0 0 5px #ffffff; margin-bottom: 20px; height: 45px; overflow: hidden; }
        
        .btn-download { background: var(--accent-color); color: var(--text-color); text-align: center; padding: 10px; border-radius: 8px; text-decoration: none; font-size: 0.95rem; display: flex; align-items: center; justify-content: center; border: none; font-weight: bold; }
        .btn-download img { width: 24px; height: 24px; }
        
        .update-notice { text-align: center; font-size: 1.1rem; margin-top: 30px; background: linear-gradient(45deg, #ffffff, #ffd700, #ff0000, #ffff00, #00ff00, #0000ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradientMove 8s ease infinite; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://i.ibb.co/4RJKQbng/1779362440088.png" alt="Welcome">
        <div class="loader-container">
            <div class="loader-bar"></div>
        </div>
    </div>

    <header>
        <div style="width: 80px;"></div> 
        <div class="header-title-container">
            <h1>GLITCH FREE FIRE</h1>
        </div>
        <div class="header-actions">
            <div class="icon-container" onclick="document.getElementById('searchModal').style.display='flex'">
                <div class="icon-glow"></div>
                <img src="https://images.icon-icons.com/561/PNG/96/search-circular-symbol_icon-icons.com_53800.png" class="action-btn" alt="بحث">
            </div>
        </div>
    </header>

    <div id="searchModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <input type="text" id="searchField" placeholder="ابحث عن قلتش...">
            <img src="https://images.icon-icons.com/2838/PNG/96/mail_send_icon_180871.png" class="send-btn" alt="إرسال" onclick="performSearch()">
        </div>
    </div>

    <div class="container">
        <div class="apps-grid" id="apps-container"></div>
        <p class="update-notice">سوف يتم تحديث قلتشات تلقائيا</p>
    </div>

    <script>
        setTimeout(function() {
            document.getElementById('splash-screen').style.display = 'none';
        }, 5000);

        let allApps = [];

        fetch('items.json')
            .then(response => response.json())
            .then(data => {
                allApps = data;
                renderApps(allApps);
            });

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("تم نسخ الكود: " + text);
            });
        }

        function renderApps(apps) {
            const container = document.getElementById('apps-container');
            container.innerHTML = '';
            apps.forEach(app => {
                container.innerHTML += `
                <div class="app-card">
                    <div class="app-info">
                        <div class="app-icon"><img src="${app.icon}" alt=""></div>
                        <div class="app-details">
                            <h3>${app.name}</h3>
                        </div>
                    </div>
                    ${app.code ? `
                    <div class="cod-container">
                        <span>COD : ${app.code}</span>
                        <img src="https://images.icon-icons.com/935/PNG/96/copy-two-paper-sheets-interface-symbol_icon-icons.com_73283.png" class="copy-btn" onclick="copyToClipboard('${app.code}')" alt="نسخ">
                    </div>` : ''}
                    <div class="app-desc">${app.desc}</div>
                    <a href="${app.link}" class="btn-download">
                        <img src="https://images.icon-icons.com/1946/PNG/96/1904659-arrow-backup-down-download-save-storage-transfer_122509.png" alt="تحميل">
                    </a>
                </div>`;
            });
        }

        function performSearch() {
            const term = document.getElementById('searchField').value.toLowerCase();
            const filtered = allApps.filter(app => app.name.toLowerCase().includes(term) || app.desc.toLowerCase().includes(term));
            renderApps(filtered);
            document.getElementById('searchModal').style.display = 'none';
        }
    </script>
</body>
</html>
