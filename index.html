<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLITCH FREE FIRE SK</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;700&display=swap" rel="stylesheet">

    <style>
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px; text-align: center; }
        .welcome-banner { background: linear-gradient(135deg, #ff0000, #ffff00); border: 3px solid #333; border-radius: 20px; padding: 20px; max-width: 400px; box-shadow: 0 0 25px rgba(255, 0, 0, 0.4); }
        .welcome-text { color: #000; font-size: 0.9rem; line-height: 1.5; text-align: justify; font-weight: bold; }
        .welcome-title { font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 1.6rem; margin-bottom: 15px; color: #000; text-shadow: 0 0 10px rgba(255, 255, 255, 0.8); text-align: center; }
        .start-btn { margin-top: 20px; padding: 8px 25px; background: #000; color: #fff; border: 1px solid #fff; border-radius: 25px; font-weight: bold; display: inline-block; font-size: 0.9rem; cursor: pointer; }
        
        :root { --card-bg: #000000; --text-color: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; font-weight: 300; }
        body { background: #000000; color: var(--text-color); line-height: 1.6; padding-bottom: 60px; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; background-color: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); z-index: 100; }
        header h1 { font-size: 1rem; font-weight: bold; }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .action-btn { cursor: pointer; width: 30px; height: 30px; }

        /* قائمة التصنيفات */
        #filter-menu { display: none; position: absolute; top: 60px; right: 20px; background: #111; border: 1px solid #333; border-radius: 10px; padding: 10px; z-index: 1000; width: 150px; }
        #filter-menu div { padding: 8px; cursor: pointer; border-bottom: 1px solid #222; }
        #filter-menu div:hover { color: #00ff00; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 40px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 300px; }
        .modal-content input { background: #000; border: 1px solid #555; color: #fff; padding: 10px; border-radius: 8px; width: 100%; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .app-card { background: #0a0a0a; border: 2px solid #00ff00; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .app-icon { width: 105px; height: 105px; background: #000; border-radius: 14px; overflow: hidden; margin-bottom: 15px; }
        .app-icon img { width: 100%; height: 100%; object-fit: cover; }
        .cod-container { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 5px 0 15px 0; background: #000; padding: 10px; border-radius: 10px; border: 1px solid #333; width: 100%; }
        .btn-download { background: linear-gradient(135deg, #ffd700, #fff); color: #000; width: 100%; padding: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="welcome-screen" onclick="document.getElementById('welcome-screen').style.display='none'">
        <div class="welcome-banner">
            <div class="welcome-title">GLITCH SKIN FF</div>
            <div class="welcome-text">أهلاً بك في منصة GLITCH SKIN FF الموثوقة. ابدأ التجربة الآن.</div>
            <div class="start-btn">ابدأ التجربة</div>
        </div>
    </div>

    <header>
        <div class="header-actions">
            <img src="https://images.icon-icons.com/3162/PNG/96/down_arrow_direction_icon_193338.png" class="action-btn" onclick="toggleFilter()" style="filter: invert(1);">
            <div id="filter-menu">
                <div onclick="filterByCategory('الكل')">الكل</div>
                <div onclick="filterByCategory('رقصات')">رقصات</div>
                <div onclick="filterByCategory('جدار جلو')">جدار جلو</div>
                <div onclick="filterByCategory('أسلحة')">أسلحة</div>
                <div onclick="filterByCategory('سكنات')">سكنات</div>
            </div>
        </div>
        <h1>GLITCH FREE FIRE</h1>
        <div class="header-actions">
            <img src="https://images.icon-icons.com/561/PNG/96/search-circular-symbol_icon-icons.com_53800.png" class="action-btn" onclick="document.getElementById('searchModal').style.display='flex'" style="filter: invert(1);">
        </div>
    </header>

    <div id="searchModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <input type="text" id="searchField" placeholder="ابحث عن قلتش...">
        </div>
    </div>

    <div class="container">
        <div class="apps-grid" id="apps-container"></div>
    </div>

    <script>
        let allApps = [];

        // ملاحظة: يجب أن يحتوي ملف JSON على خاصية category لكل عنصر
        fetch('items.json')
            .then(response => response.json())
            .then(data => {
                allApps = data;
                renderApps(allApps);
            });

        function toggleFilter() {
            const menu = document.getElementById('filter-menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        function filterByCategory(category) {
            if (category === 'الكل') {
                renderApps(allApps);
            } else {
                const filtered = allApps.filter(app => app.category && app.category.includes(category));
                renderApps(filtered);
            }
            toggleFilter();
        }

        function renderApps(apps) {
            const container = document.getElementById('apps-container');
            container.innerHTML = '';
            apps.forEach(app => {
                container.innerHTML += `
                <div class="app-card">
                    <div class="app-icon"><img src="${app.icon}"></div>
                    <h3>${app.name}</h3>
                    ${app.code ? `<div class="cod-container"><span>COD: ${app.code}</span></div>` : ''}
                    <div style="font-size: 0.8rem; margin-bottom:10px;">${app.desc}</div>
                    <a href="${app.link}" class="btn-download">تحميل</a>
                </div>`;
            });
        }
    </script>
</body>
</html>
