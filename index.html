<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة عناصر فري فاير</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-family: 'Cairo', sans-serif;
            font-weight: 300; /* الوزن المطلوب */
            text-align: center;
            /* مزيج التدرج: فضي، أبيض، أصفر، ذهبي */
            background: linear-gradient(45deg, #dcdcdc, #ffffff, #ffee55, #ffcc00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* توهج أبيض مضيء محيط بالنص */
            filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.6));
            margin-bottom: 30px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        input, select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 15px;
            border-radius: 8px;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #ff3e3e;
            box-shadow: 0 0 8px rgba(255, 62, 62, 0.3);
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            backdrop-filter: blur(5px);
            transition: transform 0.3s, border-color 0.3s;
        }

        .item-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 62, 62, 0.4);
            box-shadow: 0 5px 15px rgba(255, 62, 62, 0.1);
        }

        /* تعديل حجم الصورة والإطار المربع الذهبي والأبيض الرقيق */
        .item-card img {
            width: 55px;
            height: 55px;
            object-fit: cover;
            border-radius: 8px; /* أركان دائرية */
            border: 1.5px solid transparent; /* قاعدة للإطار المتدرج */
            background: linear-gradient(#000, #000) padding-box, 
                        linear-gradient(135deg, #ffffff, #ffcc00) border-box; /* إطار متدرج أبيض وذهبي رقيق */
            margin-bottom: 10px;
        }

        .item-name {
            font-weight: 700;
            font-size: 16px;
            margin: 8px 0;
        }

        .item-id {
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>FREE FIRE ELEMENTS</h1>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="ابحث عن عنصر...">
        <select id="categoryFilter">
            <option value="all">كل التصنيفات</option>
            <option value="characters">الشخصيات</option>
            <option value="weapons">الأسلحة</option>
            <option value="bundles">الحزم</option>
        </select>
    </div>

    <div class="items-grid" id="itemsContainer"></div>

    <script src="app.js"></script>
</body>
</html>
