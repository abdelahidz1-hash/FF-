<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLITCH FREE FIRE SK</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300&display=swap" rel="stylesheet">

    <style>
        :root { --bg-color: #000000; --card-bg: #0b0b0b; --text-color: #ffffff; --accent-color: linear-gradient(45deg, #ffd700, #ffffff, #b8860b); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; font-weight: 300; }
        body { background-color: var(--bg-color); color: var(--text-color); padding-bottom: 60px; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; background-color: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); z-index: 100; }
        header h1 { font-size: 1rem; background: linear-gradient(45deg, #ffd700, #ffea00, #ffffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 20px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; gap: 15px; width: 300px; }
        .modal-content input { background: #000; border: 1px solid #555; color: #fff; padding: 10px; border-radius: 8px; width: 100%; }
        .send-btn { width: 40px; cursor: pointer; }
        
        #imageModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        #fullImage { max-width: 90%; max-height: 90%; border-radius: 10px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .app-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 20px; text-align: center; }
        
        .app-icon { width: 218px; height: 218px; border-radius: 10px; cursor: pointer; overflow: hidden; margin: 0 auto 15px auto; background: #ffffff; }
        .app-icon img { width: 100%; height: 100%; object-fit: contain; }
        
        .app-details h3 { color: #00ff00; margin-bottom: 5px; }
        .cod-wrapper { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 10px 0; }
        .cod-text { color: #ffd700; font-size: 0.85rem; font-weight: bold; }
        .copy-btn { width: 20px; cursor: pointer; filter: invert(1); }
        .btn-download { background: var(--accent-color); padding: 10px; border-radius: 8px; text-decoration: none; display: flex; justify-content: center; align-items: center; margin-top: 15px; }
        .btn-download img { width: 30px; }
    </style>
</head>
<body>

    <header>
        <div style="width: 40px;"></div>
        <h1>GLITCH FREE FIRE</h1>
        <img src="https://images.icon-icons.com/561/PNG/96/search-circular-symbol_icon-icons.com_53800.png" width="30" onclick="document.getElementById('searchModal').style.display='flex'">
    </header>

    <div id="searchModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <input type="text" id="searchField" placeholder="ابحث...">
            <img src="https://images.icon-icons.com/2838/PNG/96/mail_send_icon_180871.png" class="send-btn" onclick="performSearch()">
        </div>
    </div>

    <div id="imageModal" onclick="this.style.display='none'">
        <img id="fullImage" src="" alt="Full View">
    </div>

    <div class="container">
        <div class="apps-grid" id="apps-container"></div>
    </div>

    <script>
        let allApps = [];

        fetch('items.json').then(r => r.json()).then(data => { allApps = data; renderApps(allApps); });

        function showFullImage(src) {
            const modal = document.getElementById('imageModal');
            document.getElementById('fullImage').src = src;
            modal.style.display = 'flex';
        }

        function copyCode(code) {
            navigator.clipboard.writeText(code).then(() => { alert("تم نسخ الكود: " + code); });
        }

        function renderApps(apps) {
            const container = document.getElementById('apps-container');
            container.innerHTML = '';
            apps.forEach(app => {
                container.innerHTML += `
                <div class="app-card">
                    <div class="app-icon" onclick="showFullImage('${app.icon}')"><img src="${app.icon}"></div>
                    <h3>${app.name}</h3>
                    ${app.code ? `
                    <div class="cod-wrapper">
                        <div class="cod-text">COD : ${app.code}</div>
                        <img src="https://images.icon-icons.com/935/PNG/96/copy-two-paper-sheets-interface-symbol_icon-icons.com_73283.png" class="copy-btn" onclick="copyCode('${app.code}')">
                    </div>` : ''}
                    <div style="margin:10px 0; font-size:0.9rem;">${app.desc}</div>
                    <a href="${app.link}" class="btn-download">
                        <img src="https://images.icon-icons.com/1946/PNG/96/1904659-arrow-backup-down-download-save-storage-transfer_122509.png">
                    </a>
                </div>`;
            });
        }

        function performSearch() {
            const term = document.getElementById('searchField').value.toLowerCase();
            renderApps(allApps.filter(a => a.name.toLowerCase().includes(term) || a.desc.toLowerCase().includes(term)));
            document.getElementById('searchModal').style.display = 'none';
        }
    </script>
</body>
</html>
