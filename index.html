<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLITCH FREE FIRE SK</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300&display=swap" rel="stylesheet">

    <style>
        /* ستايل الشاشة الترحيبية */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        #splash-screen img { width: 100%; height: 100%; object-fit: cover; }
        
        .loader-container { position: absolute; bottom: 50px; width: 80%; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; overflow: hidden; }
        .loader-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #ffd700, #ffffff); animation: progress 5s linear forwards; }
        @keyframes progress { 0% { width: 0%; } 100% { width: 100%; } }

        :root { --bg-color: #000000; --card-bg: #0b0b0b; --text-color: #ffffff; --accent-color: linear-gradient(45deg, #ffd700, #ffffff, #b8860b); }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; font-weight: 300; }
        body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; padding-bottom: 60px; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; background-color: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); z-index: 100; }
        .header-title-container { flex-grow: 1; text-align: center; }
        header h1 { font-size: 1rem; letter-spacing: 1px; background: linear-gradient(45deg, #ffd700, #ffffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
        .modal img { max-width: 90%; max-height: 90%; border-radius: 10px; }
        
        .app-card { background: rgba(255, 255, 255, 0.05); border: 1px solid #333; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .app-icon { width: 60px; height: 60px; border-radius: 14px; overflow: hidden; cursor: pointer; border: 1px solid #555; }
        .app-icon img { width: 100%; height: 100%; object-fit: cover; }
        
        .cod-text { color: #ffd700; font-size: 0.85rem; margin-top: 10px; font-weight: bold; }
        .btn-download { background: var(--accent-color); color: #000; text-align: center; padding: 10px; border-radius: 8px; text-decoration: none; display: block; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="splash-screen"><img src="https://i.ibb.co/4RJKQbng/1779362440088.png" alt="Welcome"><div class="loader-container"><div class="loader-bar"></div></div></div>

    <header>
        <div style="width: 80px;"></div> 
        <h1>GLITCH FREE FIRE</h1>
        <div onclick="document.getElementById('searchModal').style.display='flex'">🔍</div>
    </header>

    <div id="searchModal" class="modal" style="display:none; flex-direction:column;" onclick="this.style.display='none'">
        <input type="text" id="searchField" placeholder="ابحث عن قلتش..." style="padding:10px; width:80%;">
        <button onclick="performSearch()">بحث</button>
    </div>

    <!-- مودال عرض الصور -->
    <div id="imgModal" class="modal" onclick="this.style.display='none'">
        <img id="modalImg" src="" alt="Full View">
    </div>

    <div class="container" style="padding: 20px;">
        <div id="apps-container"></div>
    </div>

    <script>
        setTimeout(() => { document.getElementById('splash-screen').style.display = 'none'; }, 5000);

        let allApps = [];
        fetch('items.json').then(r => r.json()).then(data => { allApps = data; renderApps(allApps); });

        function renderApps(apps) {
            const container = document.getElementById('apps-container');
            container.innerHTML = '';
            apps.forEach(app => {
                const codDisplay = app.cod ? `COD : ${app.cod}` : "لا يوجد كود لهذا الملف";
                container.innerHTML += `
                <div class="app-card">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <div class="app-icon" onclick="showImage('${app.icon}')"><img src="${app.icon}"></div>
                        <div><h3>${app.name}</h3><div class="cod-text">${codDisplay}</div></div>
                    </div>
                    <p style="margin: 15px 0;">${app.desc}</p>
                    <a href="${app.link}" class="btn-download">تحميل</a>
                </div>`;
            });
        }

        function showImage(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('imgModal').style.display = 'flex';
        }

        function performSearch() {
            const term = document.getElementById('searchField').value.toLowerCase();
            renderApps(allApps.filter(app => app.name.toLowerCase().includes(term)));
            document.getElementById('searchModal').style.display = 'none';
        }
    </script>
</body>
</html>
