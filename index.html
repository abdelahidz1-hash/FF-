<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر التطبيقات</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #0b0b0b;
            --text-color: #ffffff;
            --accent-color: linear-gradient(45deg, #ffd700, #ffffff, #b8860b); 
            --accent-hover: linear-gradient(45deg, #ffffff, #ffea00, #ffffff);
            --muted-text: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; font-weight: 300; }
        body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; padding-bottom: 60px; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; background-color: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); z-index: 100; }
        .header-title-container { display: flex; align-items: center; gap: 10px; }
        header h1 { font-size: 0.9rem; letter-spacing: 1px; background: linear-gradient(45deg, #ffd700, #ffea00, #dcdcdc, #b8860b, #ffffff); background-size: 400% 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradientMove 6s ease infinite; font-weight: bold; }
        
        .search-container { 
            display: flex; align-items: center; background: #111; padding: 4px 12px; border-radius: 8px; 
            border: 1px solid #333; 
            background-image: linear-gradient(#111, #111), linear-gradient(45deg, #ffd700, #ffffff, #b8860b);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            box-shadow: 0 0 5px rgba(255, 215, 0, 0.1);
            gap: 15px; 
        }
        .search-container input { background: transparent; border: none; color: white; padding: 5px; outline: none; width: 80px; }
        .search-icon { width: 22px; height: 22px; cursor: pointer; filter: drop-shadow(0 0 3px rgba(255, 255, 255, 0.3)); }

        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        /* تصميم كارت التطبيق - تم إضافة الإطار المتدرج المضيء */
        .app-card { 
            background-color: var(--card-bg); 
            border: 1px solid transparent; 
            border-radius: 12px; padding: 20px; 
            display: flex; flex-direction: column; justify-content: space-between; 
            transition: transform 0.2s;
            background-image: linear-gradient(var(--card-bg), var(--card-bg)), linear-gradient(45deg, #ffd700, #ffffff, #b8860b);
            background-origin: border-box;
            background-clip: padding-box, border-box;
        }
        .app-card:hover { transform: translateY(-5px); box-shadow: 0 0 15px rgba(255, 215, 0, 0.15); }
        
        .app-info { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .app-icon { width: 60px; height: 60px; background: #1a1a1a; border-radius: 14px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .app-icon img { width: 100%; height: 100%; object-fit: cover; }
        .app-details h3 { font-size: 1.1rem; margin-bottom: 4px; }
        .app-desc { font-size: 0.9rem; color: #b3b3b3; margin-bottom: 20px; height: 45px; overflow: hidden; }
        
        .btn-download { background: var(--accent-color); color: var(--text-color); text-align: center; padding: 10px; border-radius: 8px; text-decoration: none; font-size: 0.95rem; display: flex; align-items: center; justify-content: center; border: none; }
        .update-notice { text-align: center; font-size: 1.1rem; margin-top: 30px; background: linear-gradient(45deg, #ffffff, #ffd700, #ff0000, #ffff00, #00ff00, #0000ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradientMove 8s ease infinite; }
    </style>
</head>
<body>

        <div class="header-title-container">
            <h1>GLITCH FREE FIRE</h1>
        </div>

            <input type="text" id="searchInput" placeholder="بحث...">
            <img src="https://images.icon-icons.com/1206/PNG/96/1491254410-searchfinddetailzoom_82949.png" class="search-icon" alt="بحث">
        </div>
    </header>
